<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV - Modèle Créatif</title>
<style>
  body { font-family: 'Trebuchet MS', sans-serif; margin: 0; background: #f0f4f8; }
  .header {
    background: linear-gradient(135deg, #6c5ce7, #00cec9);
    color: white; padding: 40px; text-align: center;
  }
  .photo {
    width: 100px; height: 100px; border-radius: 50%;
    object-fit: cover; border: 3px solid white; margin-bottom: 12px;
  }
  .header h1 { margin: 0; font-size: 30px; }
  .header p { margin-top: 6px; font-size: 14px; opacity: 0.95; }
  .header a { color: white; text-decoration: underline; }
  .contenu { max-width: 800px; margin: 0 auto; padding: 30px; }
  .carte {
    background: white; border-radius: 12px; padding: 20px 25px;
    margin-bottom: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .carte h2 {
    color: #6c5ce7; font-size: 16px; margin-top: 0;
    border-left: 4px solid #00cec9; padding-left: 10px;
  }
  .carte p { font-size: 14px; color: #333; }
</style>
</head>
<body>
  <div class="header">
    <img src="{{PHOTO}}" alt="Photo de profil" class="photo">
    <h1>{{NOM}}</h1>
    <p>{{POSTE}} — {{EMAIL}} — {{TELEPHONE}}</p>
    <p><a href="#">{{LINKEDIN}}</a></p>
  </div>
  <div class="contenu">
    <div class="carte">
      <h2>Profil</h2>
      <p>{{PROFIL}}</p>
    </div>
    <div class="carte">
      <h2>Formation</h2>
      <p>{{FORMATION}}</p>
    </div>
    <div class="carte">
      <h2>Expérience</h2>
      <p>{{EXPERIENCE}}</p>
    </div>
    <div class="carte">
      <h2>Compétences</h2>
      <p>{{COMPETENCES}}</p>
    </div>
    <div class="carte">
      <h2>Langues</h2>
      <p>{{LANGUES}}</p>
    </div>
  </div>
</body>
</html>
