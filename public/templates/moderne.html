<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>CV - Modèle Moderne</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; }
  .container { display: flex; max-width: 850px; margin: 0 auto; }
  .colonne-gauche {
    background: #2c3e50; color: white; width: 260px;
    padding: 30px 20px; box-sizing: border-box; text-align: center;
  }
  .photo {
    width: 110px; height: 110px; border-radius: 50%;
    object-fit: cover; border: 3px solid white; margin-bottom: 15px;
  }
  .colonne-gauche h1 { font-size: 20px; margin-bottom: 5px; }
  .colonne-gauche p { font-size: 13px; color: #dcdcdc; text-align: left; }
  .colonne-gauche h3 {
    font-size: 14px; text-transform: uppercase; text-align: left;
    border-bottom: 1px solid #4a6278; padding-bottom: 5px; margin-top: 25px;
  }
  .colonne-gauche a { color: #7fd6d0; text-decoration: none; font-size: 13px; }
  .colonne-droite { padding: 30px; flex: 1; }
  .colonne-droite h2 {
    color: #2c3e50; font-size: 16px; text-transform: uppercase;
    border-bottom: 2px solid #2c3e50; padding-bottom: 5px;
  }
  .colonne-droite .bloc { margin-bottom: 20px; }
  .colonne-droite p { font-size: 14px; color: #333; }
  ul { padding-left: 18px; margin: 5px 0; }
  li { font-size: 14px; margin-bottom: 4px; }
</style>
</head>
<body>
  <div class="container">
    <div class="colonne-gauche">
      <img src="{{PHOTO}}" alt="Photo de profil" class="photo">
      <h1>{{NOM}}</h1>
      <p style="text-align:center;">{{POSTE}}</p>

      <h3>Contact</h3>
      <p>{{EMAIL}}<br>{{TELEPHONE}}<br>{{VILLE}}</p>
      <p><a href="#">{{LINKEDIN}}</a></p>

      <h3>Compétences</h3>
      <p>{{COMPETENCES}}</p>

      <h3>Langues</h3>
      <p>{{LANGUES}}</p>
    </div>
    <div class="colonne-droite">
      <div class="bloc">
        <h2>Profil</h2>
        <p>{{PROFIL}}</p>
      </div>
      <div class="bloc">
        <h2>Formation</h2>
        <p>{{FORMATION}}</p>
      </div>
      <div class="bloc">
        <h2>Expérience</h2>
        <p>{{EXPERIENCE}}</p>
      </div>
    </div>
  </div>
</body>
</html>
