<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CV généré avec succès</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .conteneur-succes {
      max-width: 500px;
      margin: 80px auto;
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .icone-succes {
      font-size: 60px;
      margin-bottom: 20px;
    }
    .bouton-retour {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="conteneur-succes">
    <div class="icone-succes">✅</div>
    <h2>Votre CV a été généré avec succès !</h2>
    <p>Le téléchargement a dû démarrer automatiquement. Si ce n'est pas le cas, vérifiez votre dossier de téléchargements.</p>
    <a href="/formulaire.html" class="bouton-retour">Créer un autre CV</a>
  </div>
</body>
</html>
